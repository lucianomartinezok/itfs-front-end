<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Apéndice 2 - Agentes de IA para Desarrollo</title>
    <style>
        :root {
            --color-canvas-default: #ffffff;
            --color-canvas-subtle: #f6f8fa;
            --color-border-default: #d0d7de;
            --color-border-muted: #d8dee4;
            --color-fg-default: #24292f;
            --color-fg-muted: #656d76;
            --color-fg-subtle: #6e7781;
            --color-accent-fg: #0969da;
            --color-accent-emphasis: #0969da;
            --color-success-fg: #1a7f37;
            --color-attention-fg: #9a6700;
            --color-danger-fg: #d1242f;
            --shadow-small: 0 1px 0 rgba(27, 31, 36, 0.04);
            --shadow-medium: 0 3px 6px rgba(140, 149, 159, 0.15);
            --shadow-large: 0 8px 24px rgba(140, 149, 159, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--color-canvas-subtle);
            color: var(--color-fg-default);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: var(--color-canvas-default);
            border-right: 1px solid var(--color-border-default);
            padding: 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            position: relative;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border-muted);
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-fg-default);
            margin-bottom: 8px;
        }

        .sidebar-header p {
            font-size: 0.875rem;
            color: var(--color-fg-muted);
        }

        .sidebar-close {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-fg-muted);
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .sidebar-close:hover {
            background: var(--color-canvas-subtle);
            color: var(--color-fg-default);
        }

        .menu-section {
            margin-bottom: 32px;
        }

        .menu-section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .menu-item {
            display: block;
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            text-decoration: none;
            color: var(--color-fg-default);
            font-size: 0.875rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: var(--color-canvas-subtle);
            border-color: var(--color-border-default);
        }

        .menu-item.active {
            background: var(--color-accent-fg);
            color: #ffffff;
            border-color: var(--color-accent-fg);
        }

        .menu-item.discontinued {
            color: var(--color-fg-subtle);
            text-decoration: line-through;
        }

        .menu-item.discontinued.active {
            text-decoration: none;
            opacity: 0.9;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 48px;
            max-width: calc(100% - 280px);
        }

        .page-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--color-accent-emphasis);
        }

        .page-header h2 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--color-fg-default);
            margin-bottom: 12px;
        }

        .page-header p {
            font-size: 1rem;
            color: var(--color-fg-muted);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .alert-warning {
            background: #fff8c5;
            border: 1px solid #d4a72c;
            border-left: 4px solid var(--color-attention-fg);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .alert-warning h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-attention-fg);
            margin-bottom: 10px;
        }

        .alert-warning p {
            color: var(--color-fg-default);
            margin-bottom: 10px;
            line-height: 1.7;
        }

        .alert-warning p:last-child {
            margin-bottom: 0;
            font-weight: 600;
        }

        .tool-card {
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-small);
        }

        .tool-card.discontinued {
            opacity: 0.75;
        }

        .tool-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border-muted);
        }

        .tool-header h2 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--color-fg-default);
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            margin-top: 8px;
        }

        .badge.discontinued {
            background: var(--color-canvas-subtle);
            color: var(--color-fg-muted);
            border: 1px solid var(--color-border-default);
        }

        .badge.opensource {
            background: #dafbe1;
            color: var(--color-success-fg);
            border: 1px solid #4ac26b;
        }

        .tool-section {
            margin-bottom: 24px;
        }

        .tool-section:last-child {
            margin-bottom: 0;
        }

        .tool-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-fg-default);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-section h4 {
            font-size: 1.1rem;
            color: var(--color-accent-fg);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .tool-section p {
            color: var(--color-fg-muted);
            line-height: 1.6;
        }

        .tool-section em {
            color: var(--color-fg-subtle);
        }

        .tool-link {
            color: var(--color-accent-fg);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .tool-link:hover {
            border-bottom-color: var(--color-accent-fg);
        }

        .video-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 20px 0;
            border-radius: 6px;
            border: 1px solid var(--color-border-default);
        }

        .video-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
        }

        .video-fallback {
            display: block;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--color-border-default);
            text-decoration: none;
            margin: 20px 0;
        }

        .video-fallback img {
            display: block;
            width: 100%;
            height: auto;
            vertical-align: middle;
        }

        .video-fallback-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .video-fallback:hover .video-fallback-play {
            background: rgba(0, 0, 0, 0.5);
        }

        .video-fallback-note {
            font-size: 0.8rem;
            color: var(--color-fg-muted);
            margin-top: 8px;
        }

        .video-description {
            font-size: 0.875rem;
            color: var(--color-fg-muted);
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dotted var(--color-border-muted);
        }

        .extra-videos {
            list-style: none;
            margin-top: 12px;
        }

        .extra-videos li {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            padding: 8px 16px;
            background: var(--color-accent-emphasis);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .back-link:hover {
            background: #0860ca;
            text-decoration: none;
        }

        .empty-state-cta {
            margin-top: 32px;
            font-size: 1rem;
            color: var(--color-fg-muted);
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-canvas-subtle);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border-default);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-border-muted);
        }

        .mobile-menu-toggle {
            display: none;
        }

        .sidebar-overlay {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                position: relative;
            }

            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 280px;
                max-width: 85vw;
                box-shadow: var(--shadow-large);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 99;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .sidebar-overlay.active {
                display: block;
                opacity: 1;
            }

            .main-content {
                margin-left: 0;
                max-width: 100%;
                padding: 60px 16px 24px;
            }

            .mobile-menu-toggle {
                display: block;
                position: fixed;
                top: 16px;
                left: 16px;
                z-index: 101;
                background: var(--color-canvas-default);
                border: 1px solid var(--color-border-default);
                border-radius: 6px;
                padding: 10px 14px;
                cursor: pointer;
                font-size: 1.25rem;
                box-shadow: var(--shadow-medium);
                transition: all 0.2s ease;
            }

            .mobile-menu-toggle:hover {
                background: var(--color-canvas-subtle);
            }

            .tool-card {
                padding: 20px;
                margin-bottom: 16px;
            }

            .tool-header h2 {
                font-size: 1.5rem;
                line-height: 1.3;
            }

            .page-header h2 {
                font-size: 1.35rem;
            }

            .sidebar-header h1 {
                font-size: 1.25rem;
            }

            .sidebar-close {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰ Menú</button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-close" onclick="toggleSidebar()" aria-label="Cerrar menú">×</button>
            <h1>🧠 Agentes de IA</h1>
            <p>Herramientas para desarrollo con IA</p>
        </div>

        <nav id="menu">
            <div class="menu-section">
                <div class="menu-section-title">Inicio</div>
                <a href="#" class="menu-item active" data-tool="inicio" onclick="showHome(this); return false;">Introducción</a>
            </div>
            <div class="menu-section">
                <div class="menu-section-title">Herramientas</div>
                <a href="#" class="menu-item discontinued" data-tool="gemini" onclick="showTool('gemini', this); return false;">Gemini CLI</a>
                <a href="#" class="menu-item" data-tool="claude" onclick="showTool('claude', this); return false;">Claude Code</a>
                <a href="#" class="menu-item" data-tool="cursor" onclick="showTool('cursor', this); return false;">Cursor AI</a>
                <a href="#" class="menu-item" data-tool="opencode" onclick="showTool('opencode', this); return false;">Open Code</a>
                <a href="#" class="menu-item" data-tool="codex" onclick="showTool('codex', this); return false;">Codex (OpenAI)</a>
            </div>
            <div class="menu-section">
                <div class="menu-section-title">Curso</div>
                <a href="../index.html" class="menu-item">← Volver al inicio</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div id="content"></div>
    </main>

    <script>
        const toolsData = {
            gemini: {
                nombre: 'Gemini CLI',
                descontinuado: true,
                videoTitulo: 'APRENDE Gemini CLI en 20 minutos',
                videoUrl: 'https://www.youtube.com/watch?v=sWMbk6ht77c',
                videoId: 'sWMbk6ht77c',
                videoDuracion: '20:13',
                videoDescripcion: 'Este tutorial introduce Gemini CLI, la herramienta de Google para generar código desde la terminal.',
                descripcion: 'Google anunció el cierre de este servicio, por lo que ya no es una opción viable para nuevos proyectos.',
                nota: 'Google anunció el cierre de Gemini CLI. Antigravity también se encuentra al borde de la desaparición.'
            },
            claude: {
                nombre: 'Claude Code',
                videoTitulo: 'Tutorial de Claude Code',
                videoUrl: 'https://www.youtube.com/watch?v=A6oW7SnNq2g&t=1508s',
                videoId: 'A6oW7SnNq2g',
                videoDuracion: '40:34',
                videoDescripcion: 'Descubre el funcionamiento de Claude Code en la terminal, su proceso de inicialización y su integración avanzada.',
                descripcion: 'Claude Code sigue completamente vigente como el agente de codificación de Anthropic, destacado por su razonamiento profundo. Actualmente solo es posible utilizarlo de forma paga bajo suscripción.',
                videosExtra: [
                    {
                        titulo: 'Claude Code de Anthropic - Guía Completa de Uso',
                        url: 'https://www.youtube.com/watch?v=NAV4Uqepqz0',
                        duracion: '14:52'
                    }
                ]
            },
            cursor: {
                nombre: 'Cursor AI',
                videoTitulo: 'Cursor - El editor IA',
                videoUrl: 'https://www.youtube.com/watch?v=LHyyPEzDOZY',
                videoId: 'LHyyPEzDOZY',
                videoDuracion: '21:18',
                videoDescripcion: 'Demostración de funcionalidades como el autocompletado avanzado y chat de contexto en el fork de VS Code.',
                descripcion: 'Cursor se mantiene como uno de los editores líderes optimizados para IA. Cuenta con un plan gratuito con uso limitado y acceso restringido a modelos; para desbloquear el uso ilimitado de los modelos más avanzados (como GPT-4o o Claude 3.5 Sonnet) requiere una suscripción Pro mensual.',
                videosExtra: [
                    {
                        titulo: 'Cursor AI: Cómo usar el mejor editor de código con Inteligencia Artificial',
                        url: 'https://www.youtube.com/watch?v=csIAc8rwooc',
                        duracion: '18:41'
                    }
                ]
            },
            opencode: {
                nombre: 'Open Code',
                badge: 'Open-Source / Gratuito',
                videoTitulo: 'Agente de IA para programar GRATIS y LOCAL (Open Code)',
                videoUrl: 'https://www.youtube.com/watch?v=ZZq4TpNgnvg&t=614s',
                videoId: 'ZZq4TpNgnvg',
                videoDuracion: '16:32',
                descripcion: 'Un agente que podés ejecutar de manera local o remota utilizando modelos 100% gratuitos, ideal para quienes buscan independencia de las grandes plataformas comerciales y control total de su entorno.'
            },
            codex: {
                nombre: 'Codex de OpenAI',
                videoTitulo: 'OpenAI Codex: La IA que programa por ti',
                videoUrl: 'https://www.youtube.com/watch?v=xl8wWXTqSXg',
                videoId: 'xl8wWXTqSXg',
                videoDuracion: '12:15',
                descripcion: 'La renovada propuesta de OpenAI para asistencia en desarrollo. Se puede utilizar de forma gratuita dentro de un margen corto de uso, y viene integrada directamente si ya contás con la suscripción activa a ChatGPT Plus.'
            }
        };

        function setActiveMenuItem(el) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        function renderHome() {
            document.getElementById('content').innerHTML = `
                <div class="page-header">
                    <h2>🧠 Introducción a Agentes de IA para Desarrollo 🚀</h2>
                    <p>
                        Esta publicación presenta herramientas de <strong>Inteligencia Artificial</strong> que están redefiniendo el flujo de trabajo de los desarrolladores. Estas plataformas actúan como asistentes avanzados para codificación, depuración y refactorización, directamente desde tu terminal o editor de código.
                    </p>
                </div>

                <div class="alert-warning">
                    <h3>⚠️ LOS TIEMPOS QUE CORREN</h3>
                    <p>
                        <strong>Este posteo fue hecho hace 6 meses.</strong> En este corto tiempo, el panorama cambió drásticamente: Google anunció el cierre de <strong>Gemini CLI</strong> y la herramienta <strong>Antigravity</strong> ya se encuentra al borde de la desaparición. Al mismo tiempo, fuimos testigos del lanzamiento de alternativas como <strong>Codex de OpenAI</strong>.
                    </p>
                    <p>
                        Más que nunca, el método, el conocimiento y la constancia para aprender superan a las herramientas, las cuales quedan obsoletas cada vez más rápido.
                    </p>
                </div>

                <p class="empty-state-cta">
                    👈 <strong>Elegí una herramienta del menú lateral</strong> para ver información detallada, videos y recursos.
                </p>
            `;
        }

        function renderExtraVideos(videos) {
            if (!videos || !videos.length) return '';
            return `
                <div class="tool-section">
                    <h3>🔗 Videos adicionales</h3>
                    <ul class="extra-videos">
                        ${videos.map(v => `
                            <li>
                                <a href="${v.url}" class="tool-link" target="_blank" rel="noopener">
                                    <strong>${v.titulo}</strong> (${v.duracion})
                                </a>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        function getYouTubeEmbedUrl(videoId) {
            const origin = window.location.origin && window.location.protocol !== 'file:'
                ? `&origin=${encodeURIComponent(window.location.origin)}`
                : '';
            return `https://www.youtube-nocookie.com/embed/${videoId}?rel=0${origin}`;
        }

        function renderVideoPlayer(tool) {
            if (!tool.videoId) return '';

            const watchLink = `
                <a href="${tool.videoUrl}" class="tool-link" target="_blank" rel="noopener">
                    Ver en YouTube (${tool.videoDuracion})
                </a>
            `;

            if (window.location.protocol === 'file:') {
                return `
                    <div class="tool-section">
                        <h3>🎥 Video Tutorial</h3>
                        <h4>${tool.videoTitulo}</h4>
                        <a href="${tool.videoUrl}" class="video-fallback" target="_blank" rel="noopener">
                            <img src="https://img.youtube.com/vi/${tool.videoId}/hqdefault.jpg" alt="${tool.videoTitulo}" loading="lazy">
                            <span class="video-fallback-play">▶ Ver en YouTube</span>
                        </a>
                        <p class="video-fallback-note">
                            El reproductor embebido no funciona al abrir el archivo directamente desde el disco. Usá un servidor local (Live Server) o el botón de arriba.
                        </p>
                        <p class="video-description">
                            <strong>Descripción del Video:</strong> ${tool.videoDescripcion} ${watchLink}
                        </p>
                    </div>
                `;
            }

            return `
                <div class="tool-section">
                    <h3>🎥 Video Tutorial</h3>
                    <h4>${tool.videoTitulo}</h4>
                    <div class="video-embed">
                        <iframe
                            src="${getYouTubeEmbedUrl(tool.videoId)}"
                            title="${tool.videoTitulo}"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            allowfullscreen
                            loading="lazy"
                        ></iframe>
                    </div>
                    <p class="video-description">
                        <strong>Descripción del Video:</strong> ${tool.videoDescripcion} ${watchLink}
                    </p>
                </div>
            `;
        }

        function showHome(menuEl) {
            setActiveMenuItem(menuEl);
            renderHome();
            closeMobileSidebar();
        }

        function showTool(toolId, menuEl) {
            const tool = toolsData[toolId];
            if (!tool) return;

            setActiveMenuItem(menuEl);

            const discontinuedClass = tool.descontinuado ? ' discontinued' : '';
            const badge = tool.descontinuado
                ? '<span class="badge discontinued">Descontinuado</span>'
                : tool.badge
                    ? `<span class="badge opensource">${tool.badge}</span>`
                    : '';

            const videoSection = renderVideoPlayer(tool);

            document.getElementById('content').innerHTML = `
                <div class="tool-card${discontinuedClass}">
                    <div class="tool-header">
                        <h2>${tool.nombre}</h2>
                        ${badge}
                    </div>

                    ${videoSection}

                    <div class="tool-section">
                        <h3>📝 Descripción</h3>
                        <p>${tool.descripcion}</p>
                        ${tool.nota ? `<p style="margin-top:12px"><em>*Nota: ${tool.nota}*</em></p>` : ''}
                    </div>

                    ${renderExtraVideos(tool.videosExtra)}
                </div>
            `;

            closeMobileSidebar();
        }

        function closeMobileSidebar() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');

            if (isOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            }
        }

        document.getElementById('sidebar').addEventListener('click', (e) => e.stopPropagation());

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }
        });

        renderHome();
    </script>
</body>
</html>
